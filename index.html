// ── Core utilities ──
function getBackendUrl() {
  const stored = loadLocal().backendUrl;
  // Use stored URL if set, else fall back to the hardcoded constant
  return (stored && stored.includes('script.google.com')) ? stored : BACKEND;
}

function api(params) {
  const url = getBackendUrl();
  if (!url || !url.includes('script.google.com')) return Promise.resolve(null);
  return new Promise((resolve) => {
    const cb = 'cb_' + Math.random().toString(36).slice(2);
    const qs = Object.entries({...params, callback:cb})
      .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
    const s = document.createElement('script');
    const t = setTimeout(() => { delete window[cb]; s.remove(); resolve(null); }, 12000);
    window[cb] = (d) => { clearTimeout(t); delete window[cb]; s.remove(); resolve(d); };
    s.onerror = () => { clearTimeout(t); delete window[cb]; s.remove(); resolve(null); };
    s.src = `${url}?${qs}`; document.head.appendChild(s);
  });
}
function loadLocal() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; } catch(e) { return {}; } }
function saveLocal(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {} }
function todayStr() { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; }
// Normalise dates coming back from Sheets — they may arrive as full ISO strings
// e.g. "2024-01-15T05:00:00.000Z" instead of "2024-01-15"
function normalizeDate(d) { if(!d) return d; return String(d).slice(0,10); }
function daysBetween(d1,d2) { return Math.round((new Date(normalizeDate(d2)+'T12:00:00')-new Date(normalizeDate(d1)+'T12:00:00'))/86400000); }
function getLastVisit(rid, visits) {
  const rv = visits.filter(v=>String(v.restaurant_id)===String(rid)).sort((a,b)=>b.date>a.date?1:-1);
  return rv.length>0?rv[0]:null;
}
function getRestaurantRating(rid, visits) {
  const rv = visits
    .filter(v=>String(v.restaurant_id)===String(rid) && v.rating && parseInt(v.rating)>0)
    .sort((a,b)=>b.date>a.date?1:-1);
  return rv.length>0 ? parseInt(rv[0].rating) : 0;
}

function getGroupIds(g) { return Array.isArray(g.restaurant_ids)?g.restaurant_ids:String(g.restaurant_ids||'').split(',').filter(Boolean); }

// Group-aware allowance check
function getAllowanceInfo(restaurant, visits, groups) {
  const today = todayStr();
  const last = getLastVisit(restaurant.id, visits);
  const freq = parseInt(restaurant.frequency_days||30);
  const daysSince = last ? daysBetween(last.date, today) : null;
  if (daysSince!==null && daysSince<freq) {
    return { allowed:false, reason:'individual', daysUntil:freq-daysSince, daysSince };
  }
  for (const g of groups) {
    const ids = getGroupIds(g);
    if (!ids.includes(restaurant.id)) continue;
    const gLast = ids.map(id=>getLastVisit(id,visits)).filter(Boolean).sort((a,b)=>b.date>a.date?1:-1)[0];
    if (gLast) {
      const gDaysSince = daysBetween(gLast.date, today);
      const gFreq = parseInt(g.frequency_days||30);
      if (gDaysSince<gFreq) return { allowed:false, reason:'group', groupName:g.name, daysUntil:gFreq-gDaysSince, daysSince };
    }
  }
  return { allowed:true, daysSince };
}

// ── Google Maps / Places integration ──
let _mapsLoaded=false, _mapsLoading=false, _mapsCbs=[];
function loadMapsAPI(key) {
  return new Promise((resolve,reject)=>{
    if(_mapsLoaded){resolve();return;}
    if(_mapsLoading){_mapsCbs.push({resolve,reject});return;}
    _mapsLoading=true; _mapsCbs.push({resolve,reject});

    // gm_authFailure fires immediately when the key is invalid or APIs aren't enabled
    window.gm_authFailure=()=>{
      clearTimeout(tout); _mapsLoading=false; window.gm_authFailure=null;
      const msg='API key error — in Google Cloud Console, enable both "Maps JavaScript API" and "Places API" under APIs & Services → Library. Also check that this key\'s restrictions allow your GitHub Pages domain.';
      _mapsCbs.forEach(c=>c.reject(new Error(msg))); _mapsCbs=[];
    };

    // Timeout — fires if Maps API loads but never calls back
    const tout = setTimeout(()=>{
      _mapsLoading=false; window.gm_authFailure=null;
      _mapsCbs.forEach(c=>c.reject(new Error('Maps API timed out. Enable "Maps JavaScript API" + "Places API" in Google Cloud Console → Library.')));
      _mapsCbs=[];
    }, 10000);

    window.__mapsReady=()=>{
      clearTimeout(tout); window.gm_authFailure=null;
      _mapsLoaded=true; _mapsCbs.forEach(c=>c.resolve()); _mapsCbs=[];
    };
    const s=document.createElement('script');
    s.src=`https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places&callback=__mapsReady`;
    s.onerror=()=>{
      clearTimeout(tout); _mapsLoading=false; window.gm_authFailure=null;
      _mapsCbs.forEach(c=>c.reject(new Error('Failed to load Maps script. Verify your API key is correct.'))); _mapsCbs=[];
    };
    document.head.appendChild(s);
  });
}
let _loc=null;
function geocodeZip(zip) {
  return new Promise((resolve,reject)=>{
    if(_loc){resolve(_loc);return;}
    new google.maps.Geocoder().geocode({address:zip+', USA'},(res,st)=>{
      if(st==='OK'){_loc=res[0].geometry.location;resolve(_loc);}
      else reject(new Error('Geocode: '+st));
    });
  });
}
function searchPlaces(query, location) {
  return new Promise((resolve)=>{
    const div=document.createElement('div'); document.body.appendChild(div);
    new google.maps.places.PlacesService(div).textSearch(
      {query, location, type:['restaurant']},
      (res,st)=>{ div.remove(); resolve(st===google.maps.places.PlacesServiceStatus.OK?res:[]); }
    );
  });
}

// ── Places API (New) — direct REST, no SDK needed ──
// Requires "Places API (New)" enabled in Google Cloud Console on the key.
async function fetchPlacesSearch(query, zip, key) {
  const r = await fetch('https://places.googleapis.com/v1/places:searchText', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Goog-Api-Key': key,
      'X-Goog-FieldMask': 'places.id,places.displayName,places.formattedAddress,places.types,places.rating,places.userRatingCount,places.priceLevel,places.photos',
    },
    body: JSON.stringify({
      textQuery: `${query} near ${zip}`,
      maxResultCount: 10,
    }),
  });
  if (!r.ok) {
    const errBody = await r.json().catch(()=>({}));
    const msg = errBody?.error?.message || `HTTP ${r.status}`;
    throw new Error(msg);
  }
  const d = await r.json();
  return d.places || [];
}

function inferPlaceCat(types) {

  const FAST = ['fast_food_restaurant','sandwich_shop','pizza_restaurant','burger_restaurant',
    'chicken_restaurant','breakfast_restaurant','bakery','coffee_shop','diner','meal_takeaway',
    'meal_delivery','chinese_restaurant','mexican_restaurant','thai_restaurant','vietnamese_restaurant'];
  const SITDOWN = ['steak_house','fine_dining_restaurant','japanese_restaurant','sushi_restaurant',
    'french_restaurant','seafood_restaurant','italian_restaurant','spanish_restaurant'];
  if (t.some(x=>FAST.includes(x))) return 'fast_food';
  if (t.some(x=>SITDOWN.includes(x))) return 'sit_down';
  return 'casual';
}

function StarRating({ rating, onChange, size=16 }) {
  const [hover, setHover] = React.useState(0);
  const display = hover || rating;
  return (
    <div style={{display:'flex',gap:1,alignItems:'center'}}>
      {[1,2,3,4,5].map(n=>(
        <span key={n}
          style={{fontSize:size,cursor:onChange?'pointer':'default',
            color:n<=display?'#fbbf24':'#334155',lineHeight:1,userSelect:'none',
            transition:'color 0.1s'}}

      ))}
    </div>
  );
}

function RestaurantLogo({ restaurant, size=30 }) {
  const [phase, setPhase] = React.useState(0);
  // phase 0 = try best source, 1 = try fallback, 2 = emoji
  const cat   = restaurant?.category;
  const emoji = cat==='fast_food' ? '🍔' : cat==='casual' ? '🍴' : '🍷';
  const domain = restaurant && RESTAURANT_LOGOS[restaurant.id];
  const photo  = restaurant?.photo; // Places photo reference name e.g. "places/ChIJ.../photos/..."
  const apiKey = photo ? (loadLocal().placesKey || '') : '';

  // Determine src for each phase
  let src = null;
  if (phase === 0) {
    if (photo && apiKey)
      src = `https://places.googleapis.com/v1/${photo}/media?maxWidthPx=${size*2}&key=${apiKey}`;
    else if (domain)
      src = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
  } else if (phase === 1 && domain) {
    src = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
  }

  if (!src) {
    return (
      <div style={{width:size,height:size,display:'flex',alignItems:'center',
        justifyContent:'center',fontSize:size*0.65,flexShrink:0,lineHeight:1}}>
        {emoji}
      </div>
    );
  }
  return (
    <div style={{width:size,height:size,background:'#fff',borderRadius:6,overflow:'hidden',
      flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <img
        src={src}
        alt={restaurant?.name}
        style={{width:'100%',height:'100%',objectFit:'cover'}}
        onError={()=>setPhase(p=>p+1)}
      />
    </div>
  );
}

function mapsUrl(name, zip) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name+(zip?' '+zip:''))}`;
}

// ONBOARDING

function OnboardingScreen({ onComplete }) {
  const [step, setStep] = React.useState(1);
  const [zipInput, setZipInput] = React.useState('');
  const [detState, setDetState] = React.useState('');
  const [zipErr, setZipErr] = React.useState('');
  const [dbRests, setDbRests] = React.useState([]);
  const [configs, setConfigs] = React.useState({});
  const [catTab, setCatTab] = React.useState('fast_food');
  const [search, setSearch] = React.useState('');
  // Cloud restore during onboarding
  const [showRestore, setShowRestore] = React.useState(false);
  const [restoreUrl, setRestoreUrl] = React.useState('');
  const [restoreStatus, setRestoreStatus] = React.useState('');
  const [restoring, setRestoring] = React.useState(false);

  function handleZip() {
    const st = zipToState(zipInput);
    if (!st) { setZipErr('Zip not recognized — try again.'); return; }
    const avail = getAvailableForState(st);
    const init = {};
    avail.forEach(r => { init[r.id] = { active:false, frequency_days:30 }; });
    setDetState(st); setDbRests(avail); setConfigs(init); setZipErr(''); setStep(2);
  }

  async function handleCloudRestore() {
    if (!restoreUrl.includes('script.google.com')) { setRestoreStatus('⚠ Paste your full Apps Script /exec URL'); return; }
    setRestoring(true); setRestoreStatus('Connecting…');
    // Temporarily store the URL so api() can use it
    saveLocal({...loadLocal(), backendUrl: restoreUrl});
    try {
      const res = await api({action:'get_all'});
      if (res?.ok) {
        const cfg = {};
        (res.settings||[]).forEach(s=>{ cfg[s.key]=s.value; });
        const groups = (res.groups||[]).map(g=>({
          ...g,
          restaurant_ids: typeof g.restaurant_ids==='string'
            ? g.restaurant_ids.split(',').filter(Boolean)
            : (g.restaurant_ids||[])
        }));
        onComplete({
          zip: cfg.zip||'00000', state: cfg.state||'??',
          restaurants: res.restaurants||[],
          visits: (res.visits||[]).map(v=>({...v, date:normalizeDate(v.date)})),
          groups
        });
      } else {
        setRestoreStatus('⚠ Could not reach Sheets — check the URL and redeploy as "Anyone"');
        setRestoring(false);
      }
    } catch(e) { setRestoreStatus('⚠ Error: '+e.message); setRestoring(false); }
  }

  function toggle(id) { setConfigs(c=>({...c,[id]:{...c[id],active:!c[id].active}})); }
  function setFreq(id,d) { setConfigs(c=>({...c,[id]:{...c[id],frequency_days:d}})); }

  function done() {
    const rests = dbRests.filter(r=>configs[r.id]?.active).map(r=>({
      id:r.id, name:r.name, category:r.category,
      frequency_days:String(configs[r.id].frequency_days),
      tags: FOOD_TAGS[r.id]||'', active:'true', custom:'false',
    }));
    onComplete({ zip:zipInput, state:detState, restaurants:rests });
  }

  const filtered = dbRests.filter(r=>r.category===catTab&&(!search||r.name.toLowerCase().includes(search.toLowerCase())));
  const count = Object.values(configs).filter(c=>c.active).length;

  if (step===1) return (
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:360}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:52}}>🍽</div>
          <div style={{fontSize:26,color:C.text,margin:'8px 0 6px',fontFamily:'Georgia,serif'}}>Eat Tracker</div>
          <div style={{color:C.muted,fontSize:14}}>Track your restaurant visit frequency</div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.bBlue}`,borderRadius:14,padding:20}}>
          <div style={{color:C.mid,fontSize:13,marginBottom:10}}>Enter your zip code to get started</div>
          <input style={{...inp,fontSize:20,textAlign:'center',letterSpacing:6,marginBottom:8}}
            type="text" inputMode="numeric" maxLength={5} placeholder="10001"
            value={zipInput}
            onChange={e=>{setZipInput(e.target.value.replace(/\D/g,'').slice(0,5));setZipErr('');}}
            onKeyDown={e=>e.key==='Enter'&&zipInput.length===5&&handleZip()}
          />
          {zipErr&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>{zipErr}</div>}
          <button style={{...btn('#1d4ed8','#fff'),width:'100%',marginTop:4,opacity:zipInput.length!==5?0.4:1}}
            onClick={handleZip} disabled={zipInput.length!==5}>Continue →</button>
        </div>

        {/* Cloud restore shortcut */}
        <div style={{marginTop:16,textAlign:'center'}}>
          <button onClick={()=>setShowRestore(!showRestore)}
            style={{background:'none',border:'none',color:C.muted,fontSize:12,cursor:'pointer',textDecoration:'underline'}}>
            Already set up on another device? Restore from cloud ↓
          </button>
        </div>
        {showRestore&&(
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginTop:8}}>
            <div style={{color:C.mid,fontSize:12,marginBottom:8}}>Paste your Apps Script URL to restore all your data:</div>
            <input style={{...inp,fontSize:11,marginBottom:8}}
              placeholder="https://script.google.com/macros/s/.../exec"
              value={restoreUrl} onChange={e=>setRestoreUrl(e.target.value)} />
            {restoreStatus&&<div style={{color:restoreStatus.includes('⚠')?C.orange:C.green,fontSize:12,marginBottom:8}}>{restoreStatus}</div>}
            <button style={{...btn('#1e3a5f','#7dd3fc'),width:'100%',opacity:restoring?0.5:1}}
              onClick={handleCloudRestore} disabled={restoring}>
              {restoring?'Restoring…':'↓ Restore from Cloud'}
            </button>
          </div>
        )}
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:C.bg,color:C.text,fontFamily:'Georgia,serif',paddingBottom:90}}>
      <div style={{position:'sticky',top:0,zIndex:100,background:C.bar,borderBottom:`1px solid ${C.border}`,padding:'12px 14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div>
            <div style={{fontSize:15,fontWeight:700}}>Pick Your Restaurants</div>
            <div style={{color:C.muted,fontSize:11}}>📍 {zipInput} · {detState} · {count} selected</div>
          </div>
          <button style={{...btn('#166534','#4ade80'),padding:'8px 16px',fontSize:13,opacity:count===0?0.4:1}}
            onClick={done} disabled={count===0}>Done ✓</button>
        </div>
        <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:4}}>
          {[['fast_food','🍔 Fast Food'],['casual','🍴 Casual'],['sit_down','🍷 Sit-Down']].map(([k,l])=>(
            <button key={k} style={pill(catTab===k)} onClick={()=>setCatTab(k)}>{l}</button>
          ))}
        </div>
        <input style={{...inp,marginTop:8,fontSize:13,padding:'7px 12px'}}
          placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} />
      </div>
      <div style={{padding:'8px 12px'}}>
        {filtered.map(r=>{
          const cfg=configs[r.id]||{};
          return (
            <div key={r.id} style={card({borderColor:cfg.active?C.bBlue:C.border})}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div onClick={()=>toggle(r.id)} style={{
                  width:24,height:24,borderRadius:6,flexShrink:0,cursor:'pointer',
                  border:`2px solid ${cfg.active?C.blue:'#334155'}`,
                  background:cfg.active?'#1d4ed8':'transparent',
                  display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13
                }}>{cfg.active?'✓':''}</div>
                <div style={{flex:1}}>
                  <div style={{color:cfg.active?C.text:'#64748b',fontSize:14,fontWeight:cfg.active?700:400}}>{r.name}</div>
                  {FOOD_TAGS[r.id]&&<div style={{color:'#334155',fontSize:11,marginTop:2}}>{FOOD_TAGS[r.id].replace(/,/g,' · ')}</div>}
                </div>
              </div>
              {cfg.active&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
                  <div style={{color:C.muted,fontSize:11,marginBottom:6}}>Max frequency:</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {[[7,'Weekly'],[14,'Biweekly'],[30,'Monthly']].map(([d,l])=>(
                      <button key={d} style={pill(cfg.frequency_days===d)} onClick={()=>setFreq(r.id,d)}>{l}</button>
                    ))}
                    <button style={pill(![7,14,30].includes(cfg.frequency_days))} onClick={()=>{
                      const d=parseInt(window.prompt('Minimum days between visits:'));
                      if(d>0) setFreq(r.id,d);
                    }}>Custom{![7,14,30].includes(cfg.frequency_days)?` (${cfg.frequency_days}d)`:''}</button>
                  </div>
                  <div style={{color:C.cyan,fontSize:11,marginTop:5}}>✓ Max once every {cfg.frequency_days} day{cfg.frequency_days!==1?'s':''}</div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// SUGGEST TAB
// ══════════════════════════════════════════════
function SuggestTab({ restaurants, visits, groups, onLogVisit, zip }) {
  const [catFilter, setCatFilter] = React.useState('all');
  const [tagFilter, setTagFilter] = React.useState('');
  const today = todayStr();

  const active = restaurants.filter(r=>r.active==='true'||r.active===true);

  // All tags present in the user's tracked restaurants
  const presentTags = [...new Set(active.flatMap(r=>parseTags(r.tags)))].sort();

  const withStatus = active.map(r=>{
    const info = getAllowanceInfo(r, visits, groups);
    const rating = getRestaurantRating(r.id, visits);
    return {...r, ...info, rating};
  });

  const filtered = withStatus
    .filter(r=>catFilter==='all'||r.category===catFilter)
    .filter(r=>!tagFilter||parseTags(r.tags).includes(tagFilter))
    .sort((a,b)=>{
      // Available first
      if(a.allowed&&!b.allowed) return -1;
      if(!a.allowed&&b.allowed) return 1;
      // Within each group: rated (desc) first, then unrated
      const aRated = a.rating>0, bRated = b.rating>0;
      if(aRated&&!bRated) return -1;
      if(!aRated&&bRated) return 1;
      if(aRated&&bRated) return b.rating-a.rating;
      // Both unrated: sort by days since (longest first) or alpha
      if(a.allowed&&b.allowed) {
        if(a.daysSince===null&&b.daysSince!==null) return -1;
        if(a.daysSince!==null&&b.daysSince===null) return 1;
        if(a.daysSince===null&&b.daysSince===null) return a.name.localeCompare(b.name);
        return (b.daysSince||0)-(a.daysSince||0);
      }
      return (a.daysUntil||0)-(b.daysUntil||0);
    });

  const allowedCount = filtered.filter(r=>r.allowed).length;

  return (
    <div style={{paddingBottom:80}}>
      <div style={{position:'sticky',top:0,zIndex:50,background:C.bar,borderBottom:`1px solid ${C.border}`,padding:'10px 12px'}}>
        {/* Category filter */}
        <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:5}}>
          {[['all','🍽 All'],['fast_food','🍔 Fast Food'],['casual','🍴 Casual'],['sit_down','🍷 Sit-Down']].map(([k,l])=>(
            <button key={k} style={pill(catFilter===k)} onClick={()=>setCatFilter(k)}>{l}</button>
          ))}
        </div>
        {/* Food type filter */}
        {presentTags.length>0&&(
          <div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:3,marginTop:6}}>
            <button style={pill(!tagFilter,true)} onClick={()=>setTagFilter('')}>All Types</button>
            {presentTags.map(t=>(
              <button key={t} style={pill(tagFilter===t,true)} onClick={()=>setTagFilter(tagFilter===t?'':t)}>{t}</button>
            ))}
          </div>
        )}
        <div style={{color:C.muted,fontSize:11,marginTop:5}}>
          {allowedCount} of {filtered.length} available today
        </div>
      </div>

      <div style={{padding:'8px 12px'}}>
        {filtered.length===0&&(
          <div style={{textAlign:'center',padding:60,color:C.muted}}>
            <div style={{fontSize:36,marginBottom:8}}>🍽</div>
            <div>No restaurants match this filter.</div>
          </div>
        )}
        {filtered.map(r=>(
          <div key={r.id} style={{...card({borderColor:r.allowed?C.bGreen:C.border,background:r.allowed?'#0a1a10':C.card}),opacity:r.allowed?1:0.65}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <RestaurantLogo restaurant={r} size={30}/>
                  <span style={{color:r.allowed?C.text:'#64748b',fontSize:15,fontWeight:700}}>{r.name}</span>
                  {r.rating>0&&<StarRating rating={r.rating} size={13}/>}
                </div>
                <div style={{color:C.muted,fontSize:11,marginTop:3,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span>{CAT_LABELS[r.category]} · every {r.frequency_days}d{parseTags(r.tags).length>0?` · ${parseTags(r.tags).join(', ')}`:''}</span>
                  <a href={mapsUrl(r.name,zip)} target="_blank" rel="noreferrer"
                    style={{color:C.cyan,textDecoration:'none',fontSize:11,whiteSpace:'nowrap'}}>📍 Maps</a>
                </div>
                <div style={{fontSize:11,marginTop:3}}>
                  {r.allowed?(
                    <span style={{color:C.green}}>
                      ✓ {r.daysSince===null?'Never visited — fair game!':`Last visit ${r.daysSince}d ago`}
                    </span>
                  ):r.reason==='group'?(
                    <span style={{color:'#a855f7'}}>🔗 Group "{r.groupName}" — available in {r.daysUntil}d</span>
                  ):(
                    <span style={{color:C.orange}}>⏳ Available in {r.daysUntil}d</span>
                  )}
                </div>
              </div>
              {r.allowed&&(
                <button onClick={()=>onLogVisit(r)}
                  style={{...btn('#166534','#4ade80',true),flexShrink:0}}>Log Visit</button>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// SPIN TAB
// ══════════════════════════════════════════════
function SpinTab({ restaurants, visits, groups, onLogVisit, zip }) {
  const canvasUnratedRef = React.useRef(null);
  const canvasRatedRef   = React.useRef(null);
  const animRef          = React.useRef(null);
  const angleUnratedRef  = React.useRef(0);
  const angleRatedRef    = React.useRef(0);
  const confettiRef      = React.useRef(null);

  const [spinning,    setSpinning]    = React.useState(false);
  const [winners,     setWinners]     = React.useState(null);
  const [showWinners, setShowWinners] = React.useState(false);
  const [catFilter,   setCatFilter]   = React.useState('all');
  const [tagFilter,   setTagFilter]   = React.useState('');

  const active = restaurants.filter(r=>r.active==='true'||r.active===true);
  const presentTags = [...new Set(active.flatMap(r=>parseTags(r.tags)))].sort();

  const allAvailable = React.useMemo(()=>
    active
      .filter(r=>getAllowanceInfo(r,visits,groups).allowed)
      .filter(r=>catFilter==='all'||r.category===catFilter)
      .filter(r=>!tagFilter||parseTags(r.tags).includes(tagFilter)),
    [restaurants,visits,groups,catFilter,tagFilter]
  );

  // Split available pool into rated (weighted) and unrated (equal)
  const unratedOptions = React.useMemo(()=>
    allAvailable.filter(r=>getRestaurantRating(r.id,visits)===0),
    [allAvailable,visits]
  );
  const ratedOptions = React.useMemo(()=>
    allAvailable
      .filter(r=>getRestaurantRating(r.id,visits)>0)
      .map(r=>({...r, weight:getRestaurantRating(r.id,visits)})),
    [allAvailable,visits]
  );

  // ── Draw a single wheel ──
  function drawWheelCanvas(canvasRef, options, angle, weighted) {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W/2, cy = H/2;
    const r = Math.min(W,H)/2 - 12;
    ctx.clearRect(0,0,W,H);

    if (options.length===0) {
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.fillStyle='#0f172a'; ctx.fill();
      ctx.strokeStyle='#1e293b'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='#475569'; ctx.font='10px Georgia';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('None available',cx,cy);
      return;
    }

    const n = options.length;
    // Build slice angle boundaries
    let slices;
    if (weighted) {
      const total = options.reduce((s,o)=>s+o.weight,0);
      let cum=0;
      slices = options.map(o=>{
        const start=(cum/total)*Math.PI*2; cum+=o.weight;
        return {start, end:(cum/total)*Math.PI*2};
      });
    } else {
      const sz=(Math.PI*2)/n;
      slices = options.map((_,i)=>({start:i*sz, end:(i+1)*sz}));
    }

    options.forEach((opt,i)=>{
      const sa=angle+slices[i].start, ea=angle+slices[i].end;
      const color=WHEEL_COLORS[i%WHEEL_COLORS.length];
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,sa,ea); ctx.closePath();
      ctx.fillStyle=color; ctx.fill();
      // Sheen
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,sa,ea); ctx.closePath();
      const hg=ctx.createRadialGradient(cx,cy,r*0.55,cx,cy,r);
      hg.addColorStop(0,'rgba(255,255,255,0)'); hg.addColorStop(1,'rgba(255,255,255,0.13)');
      ctx.fillStyle=hg; ctx.fill();
      // Divider
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(sa)*r,cy+Math.sin(sa)*r);
      ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=1.5; ctx.stroke();
      // Label
      ctx.save(); ctx.translate(cx,cy);
      ctx.rotate(sa+(slices[i].end-slices[i].start)/2);
      ctx.textAlign='right'; ctx.textBaseline='middle';
      const fontSize=Math.max(8,Math.min(11,Math.round(160/Math.max(n,8))));
      ctx.font=`bold ${fontSize}px Georgia,serif`;
      ctx.fillStyle='#fff'; ctx.shadowColor='rgba(0,0,0,0.85)'; ctx.shadowBlur=4;
      const maxW=r-18; let text=opt.name;
      if(ctx.measureText(text).width>maxW){
        while(text.length>2&&ctx.measureText(text+'…').width>maxW) text=text.slice(0,-1);
        text+='…';
      }
      ctx.fillText(text,r-10,0); ctx.restore();
    });
    // Outer ring
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=2.5; ctx.stroke();
    // Center cap
    const cg=ctx.createRadialGradient(cx-3,cy-3,1,cx,cy,16);
    cg.addColorStop(0,'#334155'); cg.addColorStop(1,'#0f172a');
    ctx.beginPath(); ctx.arc(cx,cy,16,0,Math.PI*2);
    ctx.fillStyle=cg; ctx.fill(); ctx.strokeStyle='#f97316'; ctx.lineWidth=2; ctx.stroke();
    // Pointer
    ctx.save(); ctx.translate(cx,12);
    ctx.beginPath(); ctx.moveTo(0,18); ctx.lineTo(-9,0); ctx.lineTo(9,0); ctx.closePath();
    ctx.fillStyle='#fff'; ctx.shadowColor='rgba(249,115,22,0.9)'; ctx.shadowBlur=10;
    ctx.fill(); ctx.strokeStyle='#f97316'; ctx.lineWidth=1.5; ctx.stroke(); ctx.restore();
  }

  // ── Find winner from weighted slices ──
  function findWeightedWinner(options, angle) {
    if(!options.length) return null;
    const total=options.reduce((s,o)=>s+o.weight,0);
    let cum=0;
    const slices=options.map(o=>{const s=(cum/total)*Math.PI*2;cum+=o.weight;return{start:s,end:(cum/total)*Math.PI*2};});
    const fa=((angle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    const pa=(((-Math.PI/2)-fa)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
    const idx=slices.findIndex(s=>pa>=s.start&&pa<s.end);
    return options[idx>=0?idx:0];
  }
  function findEqualWinner(options, angle) {
    if(!options.length) return null;
    const n=options.length, sz=(Math.PI*2)/n;
    const fa=((angle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    const pa=(((-Math.PI/2)-fa)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
    return options[Math.floor(pa/sz)%n]||options[0];
  }

  function redrawAll() {
    drawWheelCanvas(canvasUnratedRef, unratedOptions, angleUnratedRef.current, false);
    drawWheelCanvas(canvasRatedRef,   ratedOptions,   angleRatedRef.current,   true);
  }

  React.useEffect(()=>{ redrawAll(); },[]);
  React.useEffect(()=>{ if(!showWinners) redrawAll(); },
    [unratedOptions.length,ratedOptions.length,catFilter,tagFilter,showWinners]);

  function spin() {
    if(spinning||unratedOptions.length<1) return;
    setSpinning(true); setShowWinners(false); setWinners(null);
    confettiRef.current=Array.from({length:28},(_,i)=>({
      left:4+Math.random()*92, top:2+Math.random()*40,
      size:5+Math.random()*9, round:Math.random()>0.45,
      color:WHEEL_COLORS[i%WHEEL_COLORS.length],
      delay:Math.random()*0.65, dur:0.8+Math.random()*1.3,
    }));
    const duration=3600+Math.random()*1600;
    const duU=(5+Math.floor(Math.random()*6))*Math.PI*2+Math.random()*Math.PI*2;
    const duR=(5+Math.floor(Math.random()*6))*Math.PI*2+Math.random()*Math.PI*2;
    const s0U=angleUnratedRef.current, s0R=angleRatedRef.current;
    const t0=performance.now();
    function frame(now) {
      const t=Math.min((now-t0)/duration,1);
      const e=1-Math.pow(1-t,5);
      angleUnratedRef.current=s0U+duU*e;
      angleRatedRef.current  =s0R+duR*e;
      drawWheelCanvas(canvasUnratedRef,unratedOptions,angleUnratedRef.current,false);
      drawWheelCanvas(canvasRatedRef,ratedOptions,angleRatedRef.current,true);
      if(t<1){animRef.current=requestAnimationFrame(frame);return;}
      const unratedWinner=findEqualWinner(unratedOptions,angleUnratedRef.current);
      const ratedWinner=ratedOptions.length>0?findWeightedWinner(ratedOptions,angleRatedRef.current):null;
      setWinners({unrated:unratedWinner,rated:ratedWinner});
      setSpinning(false);
      setTimeout(()=>setShowWinners(true),200);
    }
    animRef.current=requestAnimationFrame(frame);
  }

  return (
    <div style={{paddingBottom:80}}>
      <style>{`
        @keyframes winnerZoomIn {
          0%  { transform:scale(0.35) translateY(40px); opacity:0; }
          72% { transform:scale(1.06) translateY(-5px); opacity:1; }
          100%{ transform:scale(1) translateY(0); opacity:1; }
        }
        @keyframes confettiFall {
          0%  { transform:translateY(0) rotate(0deg) scale(1); opacity:1; }
          100%{ transform:translateY(140px) rotate(600deg) scale(0.2); opacity:0; }
        }
        @keyframes wheelGlow {
          0%,100%{ filter:drop-shadow(0 0 5px rgba(249,115,22,0.25)); }
          50%    { filter:drop-shadow(0 0 22px rgba(249,115,22,0.85)) drop-shadow(0 0 8px rgba(251,191,36,0.5)); }
        }
        @keyframes spinBtnPulse {
          0%,100%{ transform:scale(1);     box-shadow:0 4px 22px rgba(239,68,68,0.4); }
          50%    { transform:scale(1.035); box-shadow:0 6px 36px rgba(249,115,22,0.75); }
        }
        .wheel-glow-anim { animation:wheelGlow 1.8s ease-in-out infinite; }
        .spin-btn-anim   { animation:spinBtnPulse 2.2s ease-in-out infinite; }
      `}</style>

      {/* Filters */}
      <div style={{position:'sticky',top:0,zIndex:50,background:C.bar,borderBottom:`1px solid ${C.border}`,padding:'10px 12px'}}>
        <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:5}}>
          {[['all','🍽 All'],['fast_food','🍔 Fast Food'],['casual','🍴 Casual'],['sit_down','🍷 Sit-Down']].map(([k,l])=>(
            <button key={k} style={pill(catFilter===k)} onClick={()=>{setCatFilter(k);setShowWinners(false);setWinners(null);}}>{l}</button>
          ))}
        </div>
        {presentTags.length>0&&(
          <div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:3,marginTop:6}}>
            <button style={pill(!tagFilter,true)} onClick={()=>{setTagFilter('');setShowWinners(false);setWinners(null);}}>All Types</button>
            {presentTags.map(t=>(
              <button key={t} style={pill(tagFilter===t,true)} onClick={()=>{setTagFilter(tagFilter===t?'':t);setShowWinners(false);setWinners(null);}}>{t}</button>
            ))}
          </div>
        )}
        <div style={{display:'flex',gap:16,marginTop:5}}>
          <span style={{color:C.muted,fontSize:11}}>🆕 {unratedOptions.length} new</span>
          <span style={{color:'#a16207',fontSize:11}}>⭐ {ratedOptions.length} rated</span>
        </div>
      </div>

      {/* Two wheels side by side */}
      <div style={{display:'flex',gap:6,padding:'14px 8px 0',justifyContent:'center',alignItems:'flex-start'}}>
        <div style={{flex:1,maxWidth:190,display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
          <div style={{color:C.mid,fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase'}}>🆕 New</div>
          <canvas ref={canvasUnratedRef} width={200} height={200}
            className={winners&&!spinning?'wheel-glow-anim':''}
            style={{borderRadius:'50%',display:'block',width:'100%',height:'auto'}}/>
        </div>
        <div style={{flex:1,maxWidth:190,display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
          <div style={{color:'#a16207',fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase'}}>⭐ Rated</div>
          <canvas ref={canvasRatedRef} width={200} height={200}
            className={winners&&!spinning&&ratedOptions.length>0?'wheel-glow-anim':''}
            style={{borderRadius:'50%',display:'block',width:'100%',height:'auto',opacity:ratedOptions.length===0?0.4:1}}/>
        </div>
      </div>
      {ratedOptions.length===0&&(
        <div style={{textAlign:'center',color:'#475569',fontSize:11,marginTop:6,padding:'0 16px'}}>
          Rate some restaurants after visiting to unlock the rated wheel
        </div>
      )}

      {/* Spin button */}
      <div style={{display:'flex',justifyContent:'center',padding:'14px 12px 8px'}}>
        {unratedOptions.length<1 ? (
          <div style={{color:C.muted,fontSize:13,textAlign:'center',maxWidth:260,lineHeight:1.6}}>
            {allAvailable.length===0
              ? '🎉 Everything is on cooldown!'
              : 'No new restaurants available — try a broader filter.'}
          </div>
        ) : (
          <button onClick={spin} disabled={spinning}
            className={spinning?'':'spin-btn-anim'}
            style={{padding:'14px 46px',borderRadius:50,border:'none',cursor:spinning?'default':'pointer',
              fontSize:17,fontFamily:'Georgia,serif',fontWeight:700,letterSpacing:0.4,
              background:spinning?'#1e293b':'linear-gradient(135deg,#f97316 0%,#ef4444 100%)',
              color:spinning?C.muted:'#fff',transition:'background 0.3s'}}>
            {spinning?'🎡  Spinning…':'🎡  Spin!'}
          </button>
        )}
      </div>

      {/* Winners overlay */}
      {showWinners&&winners&&(
        <div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(5,8,15,0.93)',
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
          padding:'16px',overflowY:'auto'}}
          onClick={e=>{if(e.target===e.currentTarget)setShowWinners(false);}}>
          {(confettiRef.current||[]).map((c,i)=>(
            <div key={i} style={{position:'absolute',left:`${c.left}%`,top:`${c.top}%`,
              width:c.size,height:c.size,borderRadius:c.round?'50%':'3px',
              background:c.color,animation:`confettiFall ${c.dur}s ease-in ${c.delay}s forwards`,
              pointerEvents:'none'}}/>
          ))}
          <div style={{color:C.muted,fontSize:11,letterSpacing:2,textTransform:'uppercase',
            marginBottom:14,position:'relative',zIndex:1}}>
            {winners.rated?'The wheels have spoken!':'The wheel has spoken!'}
          </div>
          <div style={{display:'flex',gap:10,maxWidth:420,width:'100%',position:'relative',
            zIndex:1,flexWrap:'wrap',justifyContent:'center'}}>
            {/* New pick */}
            {winners.unrated&&(
              <div style={{flex:'1 1 145px',minWidth:145,
                background:'linear-gradient(155deg,#0f172a 0%,#1e293b 100%)',
                border:'2px solid #22c55e',borderRadius:18,padding:'18px 14px',
                textAlign:'center',animation:'winnerZoomIn 0.48s cubic-bezier(0.34,1.56,0.64,1) both',
                boxShadow:'0 0 30px #22c55e25'}}>
                <div style={{color:'#4ade80',fontSize:9,letterSpacing:1.5,textTransform:'uppercase',marginBottom:6}}>🆕 New Pick</div>
                <div style={{display:'flex',justifyContent:'center',marginBottom:6}}>
                  <RestaurantLogo restaurant={winners.unrated} size={48}/>
                </div>
                <div style={{fontSize:15,fontWeight:700,color:'#fff',marginBottom:3,lineHeight:1.2}}>{winners.unrated.name}</div>
                <div style={{fontSize:10,color:C.muted,marginBottom:4}}>{CAT_LABELS[winners.unrated.category]}</div>
                <a href={mapsUrl(winners.unrated.name,zip)} target="_blank" rel="noreferrer"
                  style={{display:'block',color:C.cyan,fontSize:11,textDecoration:'none',marginBottom:10}}>📍 Find on Maps</a>
                <button onClick={()=>{setShowWinners(false);onLogVisit(winners.unrated);}}
                  style={{padding:'8px 12px',borderRadius:10,border:'none',cursor:'pointer',fontSize:12,
                    fontFamily:'Georgia,serif',fontWeight:700,background:'#166534',color:'#4ade80',width:'100%'}}>
                  ✓ Let's eat!
                </button>
              </div>
            )}
            {/* Rated pick */}
            {winners.rated&&(
              <div style={{flex:'1 1 145px',minWidth:145,
                background:'linear-gradient(155deg,#0f172a 0%,#1e293b 100%)',
                border:'2px solid #fbbf24',borderRadius:18,padding:'18px 14px',
                textAlign:'center',animation:'winnerZoomIn 0.48s cubic-bezier(0.34,1.56,0.64,1) 0.1s both',
                boxShadow:'0 0 30px #fbbf2425'}}>
                <div style={{color:'#fbbf24',fontSize:9,letterSpacing:1.5,textTransform:'uppercase',marginBottom:6}}>⭐ Rated Pick</div>
                <div style={{display:'flex',justifyContent:'center',marginBottom:6}}>
                  <RestaurantLogo restaurant={winners.rated} size={48}/>
                </div>
                <div style={{fontSize:15,fontWeight:700,color:'#fff',marginBottom:3,lineHeight:1.2}}>{winners.rated.name}</div>
                <div style={{display:'flex',justifyContent:'center',gap:2,marginBottom:3}}>
                  {[1,2,3,4,5].map(n=>(
                    <span key={n} style={{fontSize:13,color:n<=winners.rated.weight?'#fbbf24':'#334155'}}>★</span>
                  ))}
                </div>
                <div style={{fontSize:10,color:C.muted,marginBottom:4}}>{CAT_LABELS[winners.rated.category]}</div>
                <a href={mapsUrl(winners.rated.name,zip)} target="_blank" rel="noreferrer"
                  style={{display:'block',color:C.cyan,fontSize:11,textDecoration:'none',marginBottom:10}}>📍 Find on Maps</a>
                <button onClick={()=>{setShowWinners(false);onLogVisit(winners.rated);}}
                  style={{padding:'8px 12px',borderRadius:10,border:'none',cursor:'pointer',fontSize:12,
                    fontFamily:'Georgia,serif',fontWeight:700,background:'#78350f',color:'#fde68a',width:'100%'}}>
                  ✓ Let's eat!
                </button>
              </div>
            )}
          </div>
          <button onClick={()=>setShowWinners(false)}
            style={{background:'none',border:'none',color:C.muted,fontSize:12,cursor:'pointer',
              marginTop:16,position:'relative',zIndex:1}}>
            Dismiss
          </button>
        </div>
      )}
    </div>
  );
}

// LOG TAB
// ══════════════════════════════════════════════
function LogTab({ restaurants, visits, onSaveVisit, onDeleteVisit, preSelected, onClearPre }) {
  const [selected, setSelected] = React.useState(null);
  const [date, setDate] = React.useState(todayStr());
  const [notes, setNotes] = React.useState('');
  const [rating, setRating] = React.useState(0);
  const [search, setSearch] = React.useState('');
  const [flash, setFlash] = React.useState('');

  React.useEffect(()=>{ if(preSelected){setSelected(preSelected);setSearch('');onClearPre();} },[preSelected]);

  const active = restaurants.filter(r=>r.active==='true'||r.active===true);
  const showDrop = search.length>0&&!selected;
  const dropList = active.filter(r=>r.name.toLowerCase().includes(search.toLowerCase())).slice(0,8);

  function save() {
    if(!selected) return;
    const v={ id:Date.now()+'-'+Math.random().toString(36).slice(2,7),
      restaurant_id:selected.id, restaurant_name:selected.name, date, notes,
      rating:rating>0?String(rating):'' };
    onSaveVisit(v);
    setSelected(null);setSearch('');setNotes('');setDate(todayStr());setRating(0);
    setFlash('✓ Visit logged!'); setTimeout(()=>setFlash(''),2500);
  }

  function updateVisitRating(v, newRating) {
    onSaveVisit({...v, rating:newRating>0?String(newRating):''});
  }

  const recent = [...visits].sort((a,b)=>b.date>a.date?1:-1).slice(0,40);

  return (
    <div style={{padding:'12px 12px 80px',fontFamily:'Georgia,serif'}}>
      {flash&&<div style={{background:'#166534',border:`1px solid ${C.green}`,borderRadius:8,
        padding:'10px 14px',marginBottom:10,color:'#4ade80',fontSize:13,textAlign:'center'}}>{flash}</div>}
      <div style={card({borderColor:C.bBlue})}>
        <div style={{color:C.mid,fontSize:13,fontWeight:700,marginBottom:12}}>📝 Log a Visit</div>
        <div style={{marginBottom:8,position:'relative'}}>
          <input style={{...inp}} placeholder="Search restaurant..."
            value={selected?selected.name:search}
            onChange={e=>{setSearch(e.target.value);setSelected(null);}} />
          {selected&&<button onClick={()=>{setSelected(null);setSearch('');}}
            style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
              background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:16}}>✕</button>}
          {showDrop&&dropList.length>0&&(
            <div style={{position:'absolute',left:0,right:0,zIndex:200,background:'#0d1827',
              border:`1px solid ${C.bBlue}`,borderRadius:8,marginTop:3,maxHeight:220,overflowY:'auto'}}>
              {dropList.map(r=>(
                <div key={r.id} onClick={()=>{setSelected(r);setSearch('');}}
                  style={{padding:'10px 14px',cursor:'pointer',borderBottom:`1px solid #0f172a`,color:C.text,fontSize:14}}
                  onMouseOver={e=>e.currentTarget.style.background=C.border}
                  onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                  {r.name} <span style={{color:C.muted,fontSize:11}}>· {CAT_LABELS[r.category]}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <input type="date" style={{...inp,marginBottom:8}} value={date} onChange={e=>setDate(e.target.value)} />
        <input style={{...inp,marginBottom:10}} placeholder="Notes (optional)" value={notes} onChange={e=>setNotes(e.target.value)} />
        {/* Star rating picker */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,padding:'8px 12px',
          background:'#0a0f1a',borderRadius:8,border:`1px solid ${C.border}`}}>
          <span style={{color:C.muted,fontSize:12}}>Rating:</span>
          <StarRating rating={rating} onChange={setRating} size={22}/>
          {rating>0&&<span style={{color:'#fbbf24',fontSize:12}}>{rating}/5</span>}
          {rating===0&&<span style={{color:'#334155',fontSize:11}}>tap to rate</span>}
        </div>
        <button style={{...btn(selected?'#1d4ed8':'#1e293b',selected?'#fff':C.muted),width:'100%'}}
          onClick={save} disabled={!selected}>Save Visit</button>
      </div>
      <div style={{color:C.muted,fontSize:11,margin:'14px 0 6px 4px'}}>HISTORY ({recent.length})</div>
      {recent.length===0&&<div style={{textAlign:'center',padding:30,color:'#334155',fontSize:13}}>No visits yet</div>}
      {recent.map(v=>{
        const r=restaurants.find(x=>x.id===v.restaurant_id);
        const vRating=v.rating&&parseInt(v.rating)>0?parseInt(v.rating):0;
        return (
          <div key={v.id} style={card({gap:8})}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
              <div style={{flex:1}}>
                <div style={{color:C.text,fontSize:13,fontWeight:700,marginBottom:2}}>{v.restaurant_name}</div>
                <div style={{color:C.muted,fontSize:11}}>{v.date}{v.notes?` · ${v.notes}`:''}{r?<span style={{color:'#334155'}}> · {CAT_LABELS[r.category]}</span>:''}</div>
              </div>
              <button onClick={()=>{if(window.confirm('Delete this visit?'))onDeleteVisit(v.id);}}
                style={{background:'none',border:'none',color:'#7f1d1d',cursor:'pointer',fontSize:18,padding:4,flexShrink:0}}>✕</button>
            </div>
            {/* Inline star rating editor */}
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4}}>
              <StarRating rating={vRating} onChange={newR=>updateVisitRating(v,newR)} size={18}/>
              {vRating>0
                ? <span style={{color:'#a16207',fontSize:11}}>{vRating}/5</span>
                : <span style={{color:'#334155',fontSize:11}}>tap to rate</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}
