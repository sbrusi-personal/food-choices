// GROUP FORM (inline creation/edit)
// ══════════════════════════════════════════════
function GroupForm({ restaurants, group, onSave, onCancel }) {
  const [name, setName] = React.useState(group?.name||'');
  const [selIds, setSelIds] = React.useState(group?getGroupIds(group):[]);
  const [freq, setFreq] = React.useState(parseInt(group?.frequency_days||30));
  const [search, setSearch] = React.useState('');

  const active = restaurants.filter(r=>r.active==='true'||r.active===true);
  const shown = active.filter(r=>!search||r.name.toLowerCase().includes(search.toLowerCase()));

  function toggle(id) { setSelIds(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]); }

  function save() {
    if(!name.trim()||selIds.length<2) return;
    onSave({ id:group?.id||('grp_'+Date.now()), name:name.trim(), restaurant_ids:selIds, frequency_days:freq });
  }

  return (
    <div style={card({borderColor:C.bBlue})}>
      <div style={{color:C.mid,fontSize:13,fontWeight:700,marginBottom:10}}>
        {group?'Edit Group':'New Restaurant Group'}
      </div>
      <input style={{...inp,marginBottom:8}} placeholder="Group name (e.g. Burger Places)"
        value={name} onChange={e=>setName(e.target.value)} />

      <div style={{color:C.muted,fontSize:11,marginBottom:6}}>
        Select 2+ restaurants — visiting any ONE locks out the whole group:
      </div>
      <input style={{...inp,fontSize:12,padding:'6px 10px',marginBottom:6}}
        placeholder="Search restaurants..." value={search} onChange={e=>setSearch(e.target.value)} />
      <div style={{maxHeight:200,overflowY:'auto',border:`1px solid ${C.border}`,borderRadius:8,marginBottom:10}}>
        {shown.map(r=>{
          const on=selIds.includes(r.id);
          return (
            <div key={r.id} onClick={()=>toggle(r.id)}
              style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',cursor:'pointer',
                borderBottom:`1px solid #0a0f1a`,background:on?'#0d1827':'transparent'}}>
              <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${on?C.blue:'#334155'}`,
                background:on?'#1d4ed8':'transparent',display:'flex',alignItems:'center',
                justifyContent:'center',color:'#fff',fontSize:11,flexShrink:0}}>{on?'✓':''}</div>
              <div>
                <div style={{color:on?C.text:'#64748b',fontSize:13}}>{r.name}</div>
                <div style={{color:'#334155',fontSize:10}}>{CAT_LABELS[r.category]}</div>
              </div>
            </div>
          );
        })}
      </div>

      {selIds.length>0&&(
        <div style={{color:C.cyan,fontSize:11,marginBottom:8}}>
          {selIds.length} selected: {selIds.map(id=>{const r=restaurants.find(x=>x.id===id);return r?.name;}).filter(Boolean).join(', ')}
        </div>
      )}

      <div style={{color:C.muted,fontSize:11,marginBottom:6}}>Group frequency (shared limit):</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
        {[[7,'Every week'],[14,'Every 2 wks'],[30,'Once/month']].map(([d,l])=>(
          <button key={d} style={pill(freq===d)} onClick={()=>setFreq(d)}>{l}</button>
        ))}
        <button style={pill(![7,14,30].includes(freq))} onClick={()=>{
          const d=parseInt(window.prompt('Minimum days between group visits:'));
          if(d>0)setFreq(d);
        }}>Custom{![7,14,30].includes(freq)?` (${freq}d)`:''}</button>
      </div>

      <div style={{display:'flex',gap:8}}>
        <button style={{...btn('#1e293b',C.mid),flex:1}} onClick={onCancel}>Cancel</button>
        <button style={{...btn('#1d4ed8','#fff'),flex:2,opacity:(name.trim()&&selIds.length>=2)?1:0.4}}
          onClick={save} disabled={!name.trim()||selIds.length<2}>
          {group?'Update Group':'Save Group'}
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
// SETTINGS TAB
// ══════════════════════════════════════════════
function SettingsTab({ zip, stateCode, restaurants, groups, onUpdateR, onAddR, onDeleteR, onAddGroup, onUpdateGroup, onDeleteGroup, onSync, onRestore, syncStatus }) {
  const [section, setSection] = React.useState('restaurants'); // 'restaurants'|'groups'|'add'
  const [catFilter, setCatFilter] = React.useState('all');
  const [editingFreqId, setEditingFreqId] = React.useState(null);
  const [editingTagId, setEditingTagId] = React.useState(null);
  const [editingGroup, setEditingGroup] = React.useState(null); // null|'new'|groupObj
  // Add restaurant section
  const [showAddFrom, setShowAddFrom] = React.useState(''); // ''|'db'|'custom'|'places'
  const [dbSearch, setDbSearch] = React.useState('');
  const [newName, setNewName] = React.useState('');
  const [newCat, setNewCat] = React.useState('fast_food');
  const [newFreq, setNewFreq] = React.useState(30);
  // Google Places
  const [placesKey, setPlacesKey] = React.useState(loadLocal().placesKey||'');
  const [placesQuery, setPlacesQuery] = React.useState('');
  const [placesResults, setPlacesResults] = React.useState([]);
  const [placesLoading, setPlacesLoading] = React.useState(false);
  const [placesErr, setPlacesErr] = React.useState('');
  // Place → add picker
  const [addingPlace, setAddingPlace] = React.useState(null); // place object being configured
  const [addPlaceCat, setAddPlaceCat] = React.useState('casual');
  const [addPlaceFreq, setAddPlaceFreq] = React.useState(30);
  // Backend URL (editable from Settings)
  const [backendInput, setBackendInput] = React.useState(loadLocal().backendUrl || BACKEND || '');
  const [backendSaved, setBackendSaved] = React.useState(false);

  function saveBackendUrl() {
    const url = backendInput.trim();
    saveLocal({...loadLocal(), backendUrl: url});
    setBackendSaved(true); setTimeout(()=>setBackendSaved(false), 2000);
  }

  const trackedIds = new Set(restaurants.map(r=>r.id));
  const untracked = getAvailableForState(stateCode).filter(r=>!trackedIds.has(r.id));
  const dbFiltered = untracked.filter(r=>!dbSearch||r.name.toLowerCase().includes(dbSearch.toLowerCase()));
  const trackedFiltered = catFilter==='all'?restaurants:restaurants.filter(r=>r.category===catFilter);

  async function doPlacesSearch() {
    if(!placesQuery.trim()||!placesKey.trim()) return;
    setPlacesLoading(true); setPlacesErr(''); setPlacesResults([]); setAddingPlace(null);
    try {
      saveLocal({...loadLocal(), placesKey});
      const results = await fetchPlacesSearch(placesQuery.trim(), zip, placesKey.trim());
      setPlacesResults(results);
      if(results.length===0) setPlacesErr('No results found. Try a different search term.');
    } catch(e) {
      setPlacesErr('Error: ' + e.message);
    }
    setPlacesLoading(false);
  }

  function openAddPicker(p) {
    const cat = inferPlaceCat(p.types);
    setAddingPlace(p); setAddPlaceCat(cat); setAddPlaceFreq(30);
  }

  function confirmAddPlace() {
    if(!addingPlace) return;
    const id = 'places_' + (addingPlace.id || Date.now());
    const photo = addingPlace.photos?.[0]?.name || '';
    onAddR({ id, name: addingPlace.displayName?.text || addingPlace.id, category: addPlaceCat,
      frequency_days: String(addPlaceFreq), tags:'', active:'true', custom:'true', photo });
    setPlacesResults(prev => prev.filter(x => x.id !== addingPlace.id));
    setAddingPlace(null);
  }

  function addCustom() {
    if(!newName.trim()) return;
    onAddR({ id:'custom_'+Date.now(), name:newName.trim(), category:newCat, frequency_days:String(newFreq), tags:'', active:'true', custom:'true' });
    setNewName(''); setNewCat('fast_food'); setNewFreq(30); setShowAddFrom('');
  }

  const secBtn = (k,l) => (
    <button key={k} onClick={()=>setSection(k)} style={{
      flex:1,padding:'9px 4px',background:'none',border:'none',
      borderBottom:`2px solid ${section===k?C.blue:'transparent'}`,
      color:section===k?'#93c5fd':C.muted,fontSize:12,cursor:'pointer',fontFamily:'Georgia,serif',fontWeight:section===k?700:400
    }}>{l}</button>
  );

  return (
    <div style={{paddingBottom:80,fontFamily:'Georgia,serif'}}>
      {/* Header card */}
      <div style={{background:C.bar,borderBottom:`1px solid ${C.border}`,padding:'10px 14px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:20}}>📍</span>
            <div>
              <div style={{color:C.text,fontSize:14,fontWeight:700}}>ZIP {zip} · {stateCode}</div>
              <div style={{color:C.muted,fontSize:11}}>{restaurants.length} restaurants · {groups.length} groups</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{color: syncStatus.includes('⚠')?C.orange:syncStatus.includes('✓')?C.green:C.muted, fontSize:10, textAlign:'right', maxWidth:110}}>{syncStatus}</div>
            <button style={{...btn('#1e293b',C.mid,true)}} onClick={onSync}>☁ Push</button>
            <button style={{...btn('#1e293b','#7dd3fc',true)}} onClick={onRestore} title="Pull all data from Google Sheets to this device">↓ Pull</button>
          </div>
        </div>
        {/* Backend URL config */}
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
          <div style={{color:C.muted,fontSize:11,marginBottom:5}}>Apps Script URL <span style={{color:'#334155'}}>(paste your /exec URL to enable sync)</span></div>
          <div style={{display:'flex',gap:6}}>
            <input style={{...inp,flex:1,fontSize:11,padding:'6px 10px'}}
              placeholder="https://script.google.com/macros/s/.../exec"
              value={backendInput} onChange={e=>setBackendInput(e.target.value)} />
            <button style={{...btn(backendSaved?'#166534':'#1e3a5f',backendSaved?'#4ade80':'#93c5fd',true), whiteSpace:'nowrap'}}
              onClick={saveBackendUrl}>{backendSaved?'✓ Saved':'Save'}</button>
            {backendInput.includes('script.google.com')&&(
              <a href={backendInput+'?action=get_all&callback=test'} target="_blank" rel="noreferrer"
                style={{...btn('#0f172a','#94a3b8',true),textDecoration:'none',whiteSpace:'nowrap',display:'flex',alignItems:'center'}}>Test ↗</a>
            )}
          </div>
          <div style={{color:'#334155',fontSize:10,marginTop:4}}>
            ⚠ Sync requires Apps Script deployed as <strong style={{color:C.muted}}>Execute as: Me</strong> + <strong style={{color:C.muted}}>Who has access: Anyone</strong> (not "with Google account"). Use "Test ↗" to verify — you should see JSON, not a login page.
          </div>
        </div>
        {/* Section tabs */}
        <div style={{display:'flex',marginTop:10,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
          {secBtn('restaurants','🍴 Restaurants')}
          {secBtn('groups','🔗 Groups')}
          {secBtn('add','+ Add')}
        </div>
      </div>

      <div style={{padding:'10px 12px'}}>

        {/* ── RESTAURANTS SECTION ── */}
        {section==='restaurants'&&(
          <>
            <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:10,paddingBottom:2}}>
              {[['all','All'],['fast_food','🍔'],['casual','🍴'],['sit_down','🍷']].map(([k,l])=>(
                <button key={k} style={pill(catFilter===k)} onClick={()=>setCatFilter(k)}>{l} {k==='all'?'':''}</button>
              ))}
            </div>
            {trackedFiltered.map(r=>{
              const active=r.active==='true'||r.active===true;
              const custom=r.custom==='true'||r.custom===true;
              const editingFreq=editingFreqId===r.id;
              const editingTag=editingTagId===r.id;
              const freq=parseInt(r.frequency_days||30);
              const myGroups=groups.filter(g=>getGroupIds(g).includes(r.id));
              return (
                <div key={r.id} style={card({borderColor:active?C.bBlue:C.border})}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div onClick={()=>onUpdateR({...r,active:String(!active)})} style={{
                      width:22,height:22,borderRadius:5,flexShrink:0,cursor:'pointer',
                      border:`2px solid ${active?C.blue:'#334155'}`,background:active?'#1d4ed8':'transparent',
                      display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12
                    }}>{active?'✓':''}</div>
                    <div style={{flex:1}}>
                      <div style={{color:active?C.text:'#475569',fontSize:13,fontWeight:700}}>
                        {r.name}
                        {custom&&<span style={{color:C.orange,fontSize:9,marginLeft:5}}>CUSTOM</span>}
                      </div>
                      <div style={{color:C.muted,fontSize:11}}>{CAT_LABELS[r.category]}</div>
                      {myGroups.length>0&&<div style={{color:'#7c3aed',fontSize:10,marginTop:2}}>
                        🔗 {myGroups.map(g=>g.name).join(', ')}
                      </div>}
                    </div>
                    <button onClick={()=>setEditingFreqId(editingFreq?null:r.id)}
                      style={{...btn('#1e293b',C.mid,true)}}>{freq}d</button>
                    <button onClick={()=>setEditingTagId(editingTag?null:r.id)}
                      style={{...btn('#1e293b',C.mid,true)}}>🏷</button>
                    {custom&&<button onClick={()=>{if(window.confirm(`Remove ${r.name}?`))onDeleteR(r.id);}}
                      style={{background:'none',border:'none',color:'#7f1d1d',cursor:'pointer',fontSize:16,padding:2}}>✕</button>}
                  </div>
                  {editingTag&&(
                    <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
                      <div style={{color:C.muted,fontSize:11,marginBottom:6}}>Food type tags:</div>
                      <TagChips tags={r.tags||''} editable={true} onChange={tags=>onUpdateR({...r,tags})} />
                    </div>
                  )}
                  {editingFreq&&(
                    <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
                      <div style={{color:C.muted,fontSize:11,marginBottom:6}}>Change frequency:</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {[[7,'7d'],[14,'14d'],[30,'30d']].map(([d,l])=>(
                          <button key={d} style={pill(freq===d)} onClick={()=>{onUpdateR({...r,frequency_days:String(d)});setEditingFreqId(null);}}>{l}</button>
                        ))}
                        <button style={pill(![7,14,30].includes(freq))} onClick={()=>{
                          const d=parseInt(window.prompt('Days between visits:'));
                          if(d>0){onUpdateR({...r,frequency_days:String(d)});setEditingFreqId(null);}
                        }}>Custom{![7,14,30].includes(freq)?` (${freq}d)`:''}</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </>
        )}

        {/* ── GROUPS SECTION ── */}
        {section==='groups'&&(
          <>
            {editingGroup===null&&(
              <button style={{...btn('#1e3a5f','#93c5fd'),width:'100%',marginBottom:12}}
                onClick={()=>setEditingGroup('new')}>+ Create New Group</button>
            )}
            {(editingGroup==='new'||typeof editingGroup==='object')&&editingGroup&&(
              <GroupForm
                restaurants={restaurants}
                group={editingGroup==='new'?null:editingGroup}
                onSave={g=>{
                  if(editingGroup==='new')onAddGroup(g);
                  else onUpdateGroup(g);
                  setEditingGroup(null);
                }}
                onCancel={()=>setEditingGroup(null)}
              />
            )}
            {groups.length===0&&editingGroup===null&&(
              <div style={{textAlign:'center',padding:40,color:C.muted}}>
                <div style={{fontSize:28,marginBottom:8}}>🔗</div>
                <div>No groups yet.</div>
                <div style={{fontSize:12,marginTop:4}}>Groups let you share a visit limit across multiple restaurants — e.g. "Burger Places: once a month total".</div>
              </div>
            )}
            {groups.filter(()=>editingGroup===null||typeof editingGroup==='object').map(g=>{
              const ids=getGroupIds(g);
              const members=ids.map(id=>restaurants.find(r=>r.id===id)).filter(Boolean);
              return (
                <div key={g.id} style={card({borderColor:'#581c87'})}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                    <div>
                      <div style={{color:'#c4b5fd',fontSize:14,fontWeight:700}}>🔗 {g.name}</div>
                      <div style={{color:C.muted,fontSize:11}}>Every {g.frequency_days} days · {ids.length} restaurants</div>
                    </div>
                    <div style={{display:'flex',gap:6}}>
                      <button style={{...btn('#1e293b',C.mid,true)}} onClick={()=>setEditingGroup(g)}>Edit</button>
                      <button style={{...btn('#1e293b',C.red,true)}}
                        onClick={()=>{if(window.confirm(`Delete group "${g.name}"?`))onDeleteGroup(g.id);}}>✕</button>
                    </div>
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                    {members.map(r=>(
                      <span key={r.id} style={{background:'#1e293b',borderRadius:10,padding:'2px 8px',
                        fontSize:11,color:C.mid}}>{r.name}</span>
                    ))}
                  </div>
                </div>
              );
            })}
          </>
        )}

        {/* ── ADD SECTION ── */}
        {section==='add'&&(
          <>
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
              {[['db','📋 Add from Chain List'],['places','🔍 Search Google Places'],['custom','✏️ Add Custom Restaurant']].map(([k,l])=>(
                <button key={k} style={{...btn(showAddFrom===k?C.bBlue:'#1e293b',showAddFrom===k?'#93c5fd':C.mid),textAlign:'left'}}
                  onClick={()=>setShowAddFrom(showAddFrom===k?'':k)}>{l}</button>
              ))}
            </div>

            {/* From chain database */}
            {showAddFrom==='db'&&(
              <div style={card({borderColor:C.bBlue})}>
                <div style={{color:C.mid,fontSize:13,fontWeight:700,marginBottom:8}}>Add from Chain Database</div>
                <input style={{...inp,marginBottom:8,fontSize:13,padding:'7px 12px'}}
                  placeholder="Search chains..." value={dbSearch} onChange={e=>setDbSearch(e.target.value)} />
                {dbFiltered.slice(0,12).map(r=>(
                  <div key={r.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid #0f172a`}}>
                    <div>
                      <div style={{color:C.text,fontSize:13}}>{r.name}</div>
                      <div style={{color:C.muted,fontSize:10}}>{CAT_LABELS[r.category]}{FOOD_TAGS[r.id]?' · '+FOOD_TAGS[r.id].replace(/,/g,', '):''}</div>
                    </div>
                    <button style={{...btn(C.bBlue,'#93c5fd',true)}}
                      onClick={()=>onAddR({...r,frequency_days:'30',tags:FOOD_TAGS[r.id]||'',active:'true',custom:'false'})}>Add</button>
                  </div>
                ))}
                {dbFiltered.length===0&&<div style={{color:C.muted,fontSize:12,textAlign:'center',padding:8}}>All available chains already added</div>}
              </div>
            )}

            {/* Google Places search */}
            {showAddFrom==='places'&&(
              <div style={card({borderColor:C.bBlue})}>
                <div style={{color:C.mid,fontSize:13,fontWeight:700,marginBottom:4}}>🔍 Search Google Places</div>
                <div style={{color:C.muted,fontSize:11,marginBottom:6}}>
                  Search any restaurant, cuisine, or food type near {zip}.
                </div>
                {/* API key requirements callout */}
                <div style={{background:'#0a0f1a',border:`1px solid ${C.border}`,borderRadius:8,
                  padding:'8px 12px',marginBottom:10,fontSize:11,color:'#64748b',lineHeight:1.6}}>
                  <strong style={{color:C.muted}}>Required Google Cloud setup:</strong> enable{' '}
                  <strong style={{color:'#93c5fd'}}>Places API (New)</strong> on your key.
                  Key restrictions → HTTP referrers: add <code style={{color:'#fbbf24'}}>sbrusi-personal.github.io/*</code>
                  {' '}<a href="https://console.cloud.google.com/apis/library/places-backend.googleapis.com"
                    target="_blank" style={{color:C.cyan}}>Enable it →</a>
                </div>
                <input style={{...inp,marginBottom:6,fontSize:13}} placeholder="Google Maps / Places API key"
                  value={placesKey} onChange={e=>setPlacesKey(e.target.value)} type="password" />
                <div style={{display:'flex',gap:6,marginBottom:8}}>
                  <input style={{...inp,flex:1,fontSize:13}} placeholder='restaurant name, cuisine, or food type'
                    value={placesQuery} onChange={e=>setPlacesQuery(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&doPlacesSearch()} />
                  <button style={{...btn('#1d4ed8','#fff',true),whiteSpace:'nowrap',
                    opacity:(!placesKey||!placesQuery||placesLoading)?0.5:1}}
                    onClick={doPlacesSearch} disabled={!placesKey||!placesQuery||placesLoading}>
                    {placesLoading?'Searching…':'Search'}
                  </button>
                </div>
                {placesErr&&(
                  <div style={{background:'#1c0a0a',border:`1px solid #7f1d1d`,borderRadius:8,
                    padding:'8px 12px',marginBottom:8,color:C.red,fontSize:12,lineHeight:1.5}}>
                    ⚠ {placesErr}
                    {placesErr.includes('PERMISSION_DENIED')||placesErr.includes('403')
                      ? <div style={{marginTop:4,color:'#94a3b8'}}>→ Make sure <strong>Places API (New)</strong> is enabled and the key has no domain restrictions that block this site.</div>
                      : placesErr.includes('INVALID_ARGUMENT')||placesErr.includes('400')
                      ? <div style={{marginTop:4,color:'#94a3b8'}}>→ Check the API key is correct and try again.</div>
                      : null}
                  </div>
                )}
                {/* Results */}
                {placesResults.map(p=>{
                  const name = p.displayName?.text || p.id;
                  const alreadyAdded = trackedIds.has('places_'+p.id) ||
                    restaurants.some(r=>r.name.toLowerCase()===name.toLowerCase());
                  const isExpanded = addingPlace?.id === p.id;
                  const addr = p.formattedAddress?.split(',').slice(0,2).join(',');
                  return (
                    <div key={p.id} style={{borderBottom:`1px solid #0f172a`,paddingBottom:8,marginBottom:8}}>
                      {/* Result row */}
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{color:C.text,fontSize:13,fontWeight:700}}>{name}</div>
                          {addr&&<div style={{color:C.muted,fontSize:11,marginTop:1}}>{addr}</div>}
                          {p.rating&&<div style={{color:'#a16207',fontSize:11,marginTop:1}}>
                            ★ {p.rating.toFixed(1)}{p.userRatingCount?` (${p.userRatingCount.toLocaleString()})`:''} on Google
                          </div>}
                          <a href={mapsUrl(name, zip)} target="_blank" rel="noreferrer"
                            style={{color:C.cyan,fontSize:11,textDecoration:'none'}}>📍 View on Maps</a>
                        </div>
                        {alreadyAdded
                          ? <span style={{color:C.green,fontSize:11,flexShrink:0}}>✓ In list</span>
                          : <button style={{...btn(isExpanded?'#1d4ed8':C.bBlue,isExpanded?'#fff':'#93c5fd',true),flexShrink:0}}
                              onClick={()=>isExpanded?setAddingPlace(null):openAddPicker(p)}>
                              {isExpanded?'Cancel':'+ Add'}
                            </button>}
                      </div>
                      {/* Inline add picker — expands when "+ Add" clicked */}
                      {isExpanded&&!alreadyAdded&&(
                        <div style={{marginTop:10,padding:'12px',background:'#0a0f1a',
                          border:`1px solid ${C.bBlue}`,borderRadius:10}}>
                          <div style={{color:C.mid,fontSize:11,fontWeight:700,marginBottom:8}}>Configure before adding:</div>
                          {/* Category */}
                          <div style={{marginBottom:10}}>
                            <div style={{color:C.muted,fontSize:11,marginBottom:5}}>Category</div>
                            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                              {[['fast_food','🍔 Fast Food'],['casual','🍴 Casual'],['sit_down','🍷 Sit-Down']].map(([k,l])=>(
                                <button key={k} style={pill(addPlaceCat===k)} onClick={()=>setAddPlaceCat(k)}>{l}</button>
                              ))}
                            </div>
                          </div>
                          {/* Frequency */}
                          <div style={{marginBottom:12}}>
                            <div style={{color:C.muted,fontSize:11,marginBottom:5}}>How often?</div>
                            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                              {[[7,'Weekly'],[14,'Biweekly'],[30,'Monthly']].map(([d,l])=>(
                                <button key={d} style={pill(addPlaceFreq===d)} onClick={()=>setAddPlaceFreq(d)}>{l}</button>
                              ))}
                              <button style={pill(![7,14,30].includes(addPlaceFreq))} onClick={()=>{
                                const d=parseInt(window.prompt('Minimum days between visits:'));
                                if(d>0)setAddPlaceFreq(d);
                              }}>Custom{![7,14,30].includes(addPlaceFreq)?` (${addPlaceFreq}d)`:''}</button>
                            </div>
                          </div>
                          <button style={{...btn('#1d4ed8','#fff'),width:'100%'}} onClick={confirmAddPlace}>
                            ✓ Add {name} to my list
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* Custom restaurant */}
            {showAddFrom==='custom'&&(
              <div style={card({borderColor:C.bBlue})}>
                <div style={{color:C.mid,fontSize:13,fontWeight:700,marginBottom:10}}>Add Custom Restaurant</div>
                <input style={{...inp,marginBottom:8}} placeholder="Restaurant name" value={newName} onChange={e=>setNewName(e.target.value)} />
                <select style={{...inp,marginBottom:8}} value={newCat} onChange={e=>setNewCat(e.target.value)}>
                  <option value="fast_food">Fast Food</option>
                  <option value="casual">Casual Dining</option>
                  <option value="sit_down">Sit-Down</option>
                </select>
                <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
                  {[[7,'Weekly'],[14,'Biweekly'],[30,'Monthly']].map(([d,l])=>(
                    <button key={d} style={pill(newFreq===d)} onClick={()=>setNewFreq(d)}>{l}</button>
                  ))}
                  <button style={pill(![7,14,30].includes(newFreq))} onClick={()=>{
                    const d=parseInt(window.prompt('Minimum days:')); if(d>0)setNewFreq(d);
                  }}>Custom{![7,14,30].includes(newFreq)?` (${newFreq}d)`:''}</button>
                </div>
                <button style={{...btn('#1d4ed8','#fff'),width:'100%'}} onClick={addCustom}>Add Restaurant</button>
              </div>
            )}
          </>
        )}

      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════
function App() {
  const [screen, setScreen] = React.useState('loading');
  const [tab, setTab] = React.useState('suggest');
  const [zip, setZip] = React.useState('');
  const [stateCode, setStateCode] = React.useState('');
  const [restaurants, setRestaurants] = React.useState([]);
  const [visits, setVisits] = React.useState([]);
  const [groups, setGroups] = React.useState([]);
  const [loaded, setLoaded] = React.useState(false);
  const [syncStatus, setSyncStatus] = React.useState('');
  const [logPre, setLogPre] = React.useState(null);
  const [syncDot, setSyncDot] = React.useState(''); // ''|'up'|'ok'|'err'

  const pullingRef = React.useRef(false);
  const lastPullRef = React.useRef(0); // timestamp of last pull
  const syncDotTimerRef = React.useRef(null);

  // ── Load from localStorage on mount ──
  React.useEffect(()=>{
    const loc = loadLocal();
    if(loc.zip&&loc.stateCode){
      setZip(loc.zip); setStateCode(loc.stateCode);
      setRestaurants(loc.restaurants||[]); setVisits(loc.visits||[]); setGroups(loc.groups||[]);
      setScreen('app');
    } else setScreen('onboarding');
    setLoaded(true);
  },[]);

  // ── Persist to localStorage whenever data changes ──
  React.useEffect(()=>{
    if(!loaded||screen==='loading') return;
    saveLocal({ zip, stateCode, restaurants, visits, groups, placesKey: loadLocal().placesKey||'' });
  },[zip,stateCode,restaurants,visits,groups,loaded]);

  // ── Parse groups coming back from Sheets ──
  function parseGroups(gs) {
    return (gs||[]).map(g=>({
      ...g,
      restaurant_ids: typeof g.restaurant_ids==='string'
        ? g.restaurant_ids.split(',').filter(Boolean)
        : (g.restaurant_ids||[])
    }));
  }

  // ── Pull from Sheets — throttled so rapid re-focuses don't spam ──
  // force=true bypasses the throttle (used on first open)
  async function doPull(force) {
    if(!getBackendUrl()||pullingRef.current) return;
    const now=Date.now();
    if(!force && now-lastPullRef.current<60000) return; // at most once per minute
    pullingRef.current=true; lastPullRef.current=now;
    try {
      const res=await api({action:'get_all'});
      if(res?.ok){
        if(res.restaurants?.length) setRestaurants(res.restaurants);
        if(res.visits?.length) setVisits(res.visits.map(v=>({...v,date:normalizeDate(v.date)})));
        if(res.groups?.length) setGroups(parseGroups(res.groups));
        const cfg={};
        (res.settings||[]).forEach(s=>{cfg[s.key]=s.value;});
        if(cfg.zip) setZip(cfg.zip);
        if(cfg.state) setStateCode(cfg.state);
      }
    } catch(e){}
    setTimeout(()=>{ pullingRef.current=false; },500);
  }

  // ── Pull on app open + whenever user switches back to the tab/app ──
  // No background timer — pull only on focus, push only on action
  React.useEffect(()=>{
    if(screen!=='app') return;
    doPull(true); // force pull on first open
    function onVisible(){ if(document.visibilityState==='visible') doPull(false); }
    document.addEventListener('visibilitychange', onVisible);
    return ()=>document.removeEventListener('visibilitychange', onVisible);
  },[screen]);

  // ── Show sync dot after an action-triggered push ──
  function flashSync(apiPromise) {
    setSyncDot('up');
    apiPromise.then(res=>{
      clearTimeout(syncDotTimerRef.current);
      setSyncDot(res===null?'err':'ok');
      syncDotTimerRef.current=setTimeout(()=>setSyncDot(''),3000);
    }).catch(()=>setSyncDot('err'));
  }

  function onComplete({ zip:z, state:st, restaurants:rs, visits:vs=[], groups:gs=[] }) {
    setZip(z); setStateCode(st); setRestaurants(rs); setVisits(vs); setGroups(gs); setScreen('app');
  }

  // ── Data actions: optimistic local update + immediate individual push ──
  // Each action pushes only its own item — no full-state dump, no timer, no race
  function saveVisit(v) {
    setVisits(vs=>[v,...vs.filter(x=>x.id!==v.id)]);
    flashSync(api({action:'save_visit',...v}));
  }
  function deleteVisit(id) {
    setVisits(vs=>vs.filter(x=>x.id!==id));
    flashSync(api({action:'delete_visit',id}));
  }
  function updateR(r) {
    setRestaurants(rs=>rs.map(x=>x.id===r.id?{...r,frequency_days:String(r.frequency_days)}:x));
    flashSync(api({action:'save_restaurant',...r,frequency_days:String(r.frequency_days)}));
  }
  function addR(r) {
    setRestaurants(rs=>[...rs.filter(x=>x.id!==r.id),r]);
    flashSync(api({action:'save_restaurant',...r,frequency_days:String(r.frequency_days)}));
  }
  function deleteR(id) {
    setRestaurants(rs=>rs.filter(r=>r.id!==id));
    flashSync(api({action:'delete_restaurant',id}));
  }
  function addGroup(g) {
    setGroups(gs=>[...gs.filter(x=>x.id!==g.id),g]);
    flashSync(api({action:'save_group',...g,restaurant_ids:Array.isArray(g.restaurant_ids)?g.restaurant_ids.join(','):g.restaurant_ids}));
  }
  function updateGroup(g) {
    setGroups(gs=>gs.map(x=>x.id===g.id?g:x));
    flashSync(api({action:'save_group',...g,restaurant_ids:Array.isArray(g.restaurant_ids)?g.restaurant_ids.join(','):g.restaurant_ids}));
  }
  function deleteGroup(id) {
    setGroups(gs=>gs.filter(g=>g.id!==id));
    flashSync(api({action:'delete_group',id}));
  }

  // ── Manual force-push all (Settings fallback) ──
  async function doSync() {
    if(!getBackendUrl()){ setSyncStatus('⚠ No URL — paste your Apps Script URL in Settings'); return; }
    setSyncStatus('Pushing…');
    try {
      for(const r of restaurants) await api({action:'save_restaurant',...r,frequency_days:String(r.frequency_days)});
      for(const v of visits) await api({action:'save_visit',...v});
      for(const g of groups) await api({action:'save_group',...g,restaurant_ids:Array.isArray(g.restaurant_ids)?g.restaurant_ids.join(','):g.restaurant_ids});
      await api({action:'save_setting',key:'zip',value:zip});
      await api({action:'save_setting',key:'state',value:stateCode});
      setSyncStatus('✓ Pushed '+new Date().toLocaleTimeString());
    } catch(e){ setSyncStatus('⚠ Error: '+e.message); }
  }

  // ── Manual force-pull all (Settings fallback) ──
  async function doRestore() {
    if(!getBackendUrl()){ setSyncStatus('⚠ No URL — paste your Apps Script URL in Settings first'); return; }
    if(!window.confirm('Replace all local data with what\'s saved in Google Sheets?')) return;
    setSyncStatus('Pulling…');
    try {
      const res=await api({action:'get_all'});
      if(res?.ok){
        if(res.restaurants?.length) setRestaurants(res.restaurants);
        if(res.visits?.length) setVisits(res.visits.map(v=>({...v,date:normalizeDate(v.date)})));
        if(res.groups?.length) setGroups(parseGroups(res.groups));
        const cfg={};
        (res.settings||[]).forEach(s=>{cfg[s.key]=s.value;});
        if(cfg.zip) setZip(cfg.zip);
        if(cfg.state) setStateCode(cfg.state);
        setSyncStatus('✓ Pulled '+new Date().toLocaleTimeString());
      } else setSyncStatus('⚠ URL unreachable — check Apps Script is deployed as "Anyone"');
    } catch(e){ setSyncStatus('⚠ Error: '+e.message); }
  }

  if(screen==='loading') return (
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{color:C.muted}}>Loading…</div>
    </div>
  );
  if(screen==='onboarding') return <OnboardingScreen onComplete={onComplete} />;

  return (
    <div style={{minHeight:'100vh',background:C.bg,color:C.text,fontFamily:'Georgia,serif'}}>
      <div style={{background:C.bar,borderBottom:`1px solid ${C.border}`,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:16,fontWeight:700}}>🍽 Eat Tracker</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {syncDot==='up'&&<span style={{fontSize:10,color:'#7dd3fc',fontWeight:700}} title="Saving…">↑</span>}
          {syncDot==='ok'&&<span style={{fontSize:10,color:C.green,fontWeight:700}} title="Saved">✓</span>}
          {syncDot==='err'&&<span style={{fontSize:10,color:C.orange,fontWeight:700}} title="Sync error — check Settings">⚠</span>}
          <div style={{color:C.muted,fontSize:11}}>📍 {zip} · {stateCode}</div>
        </div>
      </div>

      {tab==='suggest'&&<SuggestTab restaurants={restaurants} visits={visits} groups={groups} zip={zip} onLogVisit={r=>{setLogPre(r);setTab('log');}} />}
      {tab==='wheel'&&<SpinTab restaurants={restaurants} visits={visits} groups={groups} zip={zip} onLogVisit={r=>{setLogPre(r);setTab('log');}} />}
      {tab==='log'&&<LogTab restaurants={restaurants} visits={visits} onSaveVisit={saveVisit}
        onDeleteVisit={deleteVisit} preSelected={logPre} onClearPre={()=>setLogPre(null)} />}
      {tab==='settings'&&<SettingsTab zip={zip} stateCode={stateCode} restaurants={restaurants} groups={groups}
        onUpdateR={updateR} onAddR={addR} onDeleteR={deleteR}
        onAddGroup={addGroup} onUpdateGroup={updateGroup} onDeleteGroup={deleteGroup}
        onSync={doSync} onRestore={doRestore} syncStatus={syncStatus} />}

      <div style={{position:'fixed',bottom:0,left:0,right:0,background:C.bar,borderTop:`1px solid ${C.border}`,display:'flex',zIndex:200}}>
        {[['suggest','💡','Suggest'],['wheel','🎡','Wheel'],['log','📝','Log'],['settings','⚙️','Settings']].map(([k,ic,lb])=>(
          <button key={k} onClick={()=>setTab(k)} style={{
            flex:1,padding:'10px 4px 13px',background:'none',border:'none',
            borderTop:`2px solid ${tab===k?C.blue:'transparent'}`,
            color:tab===k?'#93c5fd':C.muted,fontSize:10,cursor:'pointer',
            fontWeight:tab===k?700:400,fontFamily:'Georgia,serif',
            display:'flex',flexDirection:'column',alignItems:'center',gap:2
          }}>
            <span style={{fontSize:18}}>{ic}</span>{lb}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
